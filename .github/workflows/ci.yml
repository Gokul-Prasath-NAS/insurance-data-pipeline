# Insurance Data Pipeline CI/CD Pipeline
# Runs automatically on every push and pull request
# to the main branch.
# Pipeline stages:
# 1. lint: Check code style with flake8
# 2. test: Run unit tests with pytest
# AWS equivalent: AWS CodePipeline / CodeBuild

name: Insurance Data Pipeline CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Stage 1: Lint
  # Checks Python code style and syntax errors
  # Fails fast if code quality standards not met
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: |
          pip install flake8

      - name: Run flake8 linting
        run: |
          flake8 jobs/ dags/ tests/ \
            --max-line-length=200 \
            --exclude=__pycache__ \
            --statistics \
            --count

  # Stage 2: Test
  # Runs all unit tests with pytest
  # Tests run in parallel across Python versions
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint # only run tests if lint passes
    strategy:
      matrix:
        python-version: ["3.11", "3.12"] # test on multiple versions
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            pyspark==3.5.1 \
            pandas \
            pyarrow \
            boto3 \
            requests \
            python-dotenv \
            pyyaml \
            duckdb \
            great-expectations \
            pytest \
            pytest-cov \
            flake8 \
            black \
            minio

      - name: Set up environment variables
        run: |
          cp .env.example .env
          echo "MINIO_ENDPOINT=http://localhost:9000" >> .env
          echo "RAW_DATA_URL=https://raw.githubusercontent.com/stedy/Machine-Learning-with-R-datasets/master/insurance.csv" >> .env
          echo "DUCKDB_DATABASE_PATH=./data/warehouse/insurance.duckdb" >> .env
          echo "AIRFLOW_FERNET_KEY=test-fernet-key-for-ci" >> .env

      - name: Create required directories
        run: |
          mkdir -p data/raw data/processed data/warehouse logs

      - name: Run unit tests with coverage
        run: |
          pytest tests/ -v \
            --cov=jobs \
            --cov-report-term-missing \
            --cov-report=xml \
            --ignore=tests/test_transformation.py

      - name: Run transformation tests
        run: |
          pytest tests/test_transformation.py -v \
            --cov=jobs/transformation \
            --cov-report-term-missing
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          PYSPARK_PYTHON: python3

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.12'
        with:
          name: coverage-report
          path: coverage.xml