# Insurance Data Pipeline - Local Infrastructure
# Every service here maps to a real AWS service:
# minio             -> S3
# postgres          -> RDS (Airflow metadata store)
# duckdb (files)    -> Amazon Redshift / Snowflake

# Reusable Airflow config block
# x-airflow-common avoids repeating the same config
# across webserver and scheduler services
x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3
  environment:
    AIRFLOW_CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__SECRET_KEY: insurance_pipeline_secret
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    PYTHONPATH: /opt/airflow/jobs
  volumes:
    - ./dags:/opt/airflow/dags            # Your DAG files
    - ./jobs:/opt/airflow/jobs            # PySpark jobs
    - ./logs:/opt/airflow/logs            # Pipeline logs
    - ./data:/opt/airflow/data            # Data files
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - pipeline_network

services:
  # MinIO
  # AWS S3 Equivalent
  # Stores raw and processed insurance data files
  # API endpoint   -> http://localhost:9000
  # Web console    -> http://localhost:9001
  minio:
    image: minio/minio:latest
    container_name: insurance_minio
    ports:
      - "9000:9000"  # S3 API - used by boto3/PySpark
      - "9001:9001"  # Web console - like AWS S3 console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 30s
    networks:
      - pipeline_network

  # MinIO Init
  # Runs once on startup to create S3 buckets
  # Like running aws s3 mb s3://bucket-name
  minio-init:
    image: minio/mc:latest
    container_name: insurance_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - >
        mc alias set local http://minio:9000 minioadmin minioadmin123 &&
        mc mb --ignore-existing local/insurance-raw &&
        mc mb --ignore-existing local/insurance-processed &&
        echo 'Buckets created: successfully'
    networks:
      - pipeline_network

  # PostgreSQL
  # Airflow metadata database
  # Stores DAG runs, task states, connections
  # NOT your data warehouse - purely for Airflow
  postgres:
    image: postgres:15
    container_name: insurance_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - pipeline_network
 
  # PySpark
  # Custom built image - AWS Glue equivalent runs PySpark jobs locally
  # Built from infra/Dockerfile.spark
  # Runs on Linux - no winutils needed
  spark:
    build:
      context: ..
      dockerfile: infra/Dockerfile.spark
    image: insurance_spark:latest
    container_name: insurance_spark
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
      MINIO_BUCKET_RAW: insurance-raw
      MINIO_BUCKET_PROCESSED: insurance-processed
    volumes:
      - ../jobs:/opt/spark/app/jobs
      - ../data:/opt/spark/app/data
      - ../config:/opt/spark/app/config
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - pipeline_network

  # Airflow Init
  # Runs once to set up Airflow database tables
  # and create the admin user
  # Equivalent to CDK bootstrap in AWS
  airflow-init:
    <<: *airflow-common
    container_name: insurance_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --firstname Gokul \
          --lastname Prasath \
          --role Admin \
          --email gokulprasath560@gmail.com \
          --password admin123 &&
        echo 'Airflow initialized successfully'
    restart: on-failure

  # Airflow Webserver
  # Pipeline monitoring UI
  # Access at http://localhost:8080
  # Like AWS Step Functions console
  airflow-webserver:
    <<: *airflow-common
    container_name: insurance_airflow_webserver
    ports:
      - "8080:8080"
    command: webserver
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # Airflow Scheduler
  # Reads DAG files and triggers task execution
  # Like the event engine in Step Functions
  airflow-scheduler:
    <<: *airflow-common
    container_name: insurance_airflow_scheduler
    command: scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped


# Volumes
# Persistent storage that survives container restarts
# Like EBS volumes attached to EC2 instances
volumes:
  minio_data:     # Persists MinIO bucket files (S3 data)
  postgres_data:  # Persists Airflow metadata (DAG runs, logs)

# Networks
# Internal network so containers talk to each other
# Like a VPC in AWS - isolated private network
networks:
  pipeline_network:
    driver: bridge
